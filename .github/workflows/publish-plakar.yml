name: Build and Push Plakar Image

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'plakar-tag.txt' # Trigger only if this file changes

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Read tag from file
        id: tag
        run: |
          echo "TAG=$(cat plakar-tag.txt)" >> $GITHUB_OUTPUT

      - name: Checkout PlakarKorp/plakar at specific tag
        uses: actions/checkout@v4
        with:
          repository: PlakarKorp/plakar
          ref: ${{ steps.tag.outputs.TAG }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/plakar:${{ steps.tag.outputs.TAG }}
            ghcr.io/${{ github.repository }}/plakar:latest